{% extends 'base.html' %}
{% block content %}
<div class="mb-6 flex justify-between items-center">
    <h2 class="text-2xl font-semibold text-gray-800">Kullanıcı Yönetimi</h2>
</div>

<div class="space-y-6">
    <!-- Kullanıcı Listesi -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <div class="flex flex-wrap justify-between items-center mb-6 gap-4">
            <h3 class="text-lg font-semibold text-gray-800">Kullanıcı Listesi</h3>
            <div class="flex items-center gap-2">
                <input type="text" placeholder="Filtre..." class="border border-gray-300 rounded-md py-1.5 px-3 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500">
                <select class="border border-gray-300 rounded-md py-1.5 px-3 text-sm text-gray-600 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    <option>Tüm Roller</option>
                    <option>Öğrenci</option>
                    <option>Akademisyen</option>
                </select>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-gray-200">
                        <th class="py-3 px-4 text-xs font-semibold text-gray-600 uppercase tracking-wider">Ad Soyad</th>
                        <th class="py-3 px-4 text-xs font-semibold text-gray-600 uppercase tracking-wider">Kullanıcı Adı</th>
                        <th class="py-3 px-4 text-xs font-semibold text-gray-600 uppercase tracking-wider">Rol</th>
                        <th class="py-3 px-4 text-right text-xs font-semibold text-gray-600 uppercase tracking-wider">İşlem</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    {% for user in users %}
                    <tr class="hover:bg-gray-50 transition">
                        <td class="py-3 px-4 text-sm font-medium text-gray-900">
                            <div class="flex items-center gap-2">
                                <div class="w-6 h-6 rounded-full bg-gray-200 flex items-center justify-center text-[10px] text-gray-600"><i class="fa-solid fa-user"></i></div>
                                {{ user.name }}
                            </div>
                        </td>
                        <td class="py-3 px-4 text-sm text-gray-600">{{ user.username }}</td>
                        <td class="py-3 px-4 text-sm text-gray-600">
                            <span class="px-2 py-0.5 rounded text-xs font-medium 
                                {% if user.role == 'admin' %}bg-purple-100 text-purple-700
                                {% elif user.role == 'academician' %}bg-blue-100 text-blue-700
                                {% else %}bg-green-100 text-green-700{% endif %}">
                                {{ user.role|capitalize }}
                            </span>
                        </td>
                        <td class="py-3 px-4 text-right text-sm">
                            <div class="flex justify-end gap-2">
                                <button type="button" onclick="openEditModal('{{ user.id }}', '{{ user.username }}', '{{ user.name }}', '{{ user.role }}')" class="text-indigo-500 hover:text-indigo-700 transition" title="Düzenle">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <form method="POST" action="{{ url_for('delete_user', user_id=user.id) }}" onsubmit="return confirm('Silmek istediğinize emin misiniz?');">
                                    <button type="submit" class="text-red-500 hover:text-red-700 transition" title="Sil">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <!-- Düzenleme Modalı (Gizli) -->
    <div id="edit-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden flex items-center justify-center z-50 transition-opacity">
        <div class="bg-white rounded-xl shadow-lg w-full max-w-md p-6 relative">
            <button onclick="closeEditModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <h3 class="text-xl font-bold text-gray-800 mb-4">Kullanıcıyı Düzenle</h3>
            <form id="edit-form" method="POST" action="" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Kullanıcı Adı</label>
                    <input type="text" id="edit-username" name="username" required class="w-full border border-gray-300 rounded-md py-2 px-3 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Ad Soyad</label>
                    <input type="text" id="edit-name" name="name" required class="w-full border border-gray-300 rounded-md py-2 px-3 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Rol</label>
                    <select id="edit-role" name="role" class="w-full border border-gray-300 rounded-md py-2 px-3 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-500">
                        <option value="student">Öğrenci</option>
                        <option value="academician">Akademisyen</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Yeni Şifre (İsteğe Bağlı)</label>
                    <input type="password" name="password" placeholder="Değiştirmek istemiyorsanız boş bırakın" class="w-full border border-gray-300 rounded-md py-2 px-3 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500">
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeEditModal()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md text-sm font-medium hover:bg-gray-200 transition">İptal</button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md text-sm font-medium hover:bg-indigo-700 shadow-sm transition">Kaydet</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openEditModal(id, username, name, role) {
            document.getElementById('edit-form').action = '/admin/edit_user/' + id;
            document.getElementById('edit-username').value = username;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-role').value = role;
            document.getElementById('edit-modal').classList.remove('hidden');
        }
        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
        }
    </script>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Kullanıcı Ekleme Formu -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">Yeni Kullanıcı Ekle</h3>
            <form method="POST" action="{{ url_for('add_user') }}" class="space-y-4">
                <div>
                    <input type="text" name="username" placeholder="Kullanıcı Adı" required class="w-full border border-gray-300 rounded-md py-2 px-3 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500">
                </div>
                <div>
                    <input type="text" name="name" placeholder="Ad Soyad" required class="w-full border border-gray-300 rounded-md py-2 px-3 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500">
                </div>
                <div>
                    <select name="role" class="w-full border border-gray-300 rounded-md py-2 px-3 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-500">
                        <option value="student">Öğrenci</option>
                        <option value="academician">Akademisyen</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-[#1e293b] text-white rounded-md py-2 text-sm font-medium hover:bg-slate-700 transition">Kullanıcıyı Kaydet</button>
            </form>
        </div>

        <!-- Ders Ekleme Formu -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">Yeni Ders Ekle</h3>
            <form method="POST" action="{{ url_for('add_course') }}" class="space-y-4">
                <div>
                    <input type="text" name="code" placeholder="Ders Kodu" required class="w-full border border-gray-300 rounded-md py-2 px-3 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500">
                </div>
                <div>
                    <input type="text" name="name" placeholder="Ders Adı" required class="w-full border border-gray-300 rounded-md py-2 px-3 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500">
                </div>
                <div>
                    <select name="academician_id" class="w-full border border-gray-300 rounded-md py-2 px-3 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-500">
                        <option value="">Sorumlu Hoca (İsteğe Bağlı)</option>
                        {% for ac in academicians %}
                        <option value="{{ ac.id }}">{{ ac.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white rounded-md py-2 text-sm font-medium hover:bg-indigo-700 transition">Ders Oluştur</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
