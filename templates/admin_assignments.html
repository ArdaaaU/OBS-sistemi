{% extends 'base.html' %}
{% block content %}
<div class="mb-6 flex justify-between items-center">
    <h2 class="text-2xl font-semibold text-gray-800">Ders Atama</h2>
</div>

<!-- Ders Atama Formu -->
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-4xl">
    <h3 class="text-lg font-semibold text-gray-800 mb-4">Öğrenciyi Derse Ata</h3>
    <form method="POST" action="{{ url_for('enroll_student') }}" class="flex flex-col md:flex-row gap-4 items-end">
        <div class="flex-1 w-full">
            <label class="block text-sm font-medium text-gray-700 mb-1">Öğrenci</label>
            <select name="student_id" required class="w-full border border-gray-300 rounded-md py-2 px-3 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-500">
                <option value="">Öğrenci Seçin...</option>
                {% for st in students %}
                <option value="{{ st.id }}">{{ st.name }} ({{ st.username }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex-1 w-full">
            <label class="block text-sm font-medium text-gray-700 mb-1">Ders</label>
            <select name="course_id" required class="w-full border border-gray-300 rounded-md py-2 px-3 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-indigo-500">
                <option value="">Ders Seçin...</option>
                {% for c in courses %}
                <option value="{{ c.id }}">{{ c.code }} - {{ c.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="w-full md:w-auto">
            <button type="submit" class="w-full md:w-auto bg-green-600 text-white rounded-md py-2 px-6 text-sm font-medium hover:bg-green-700 transition">Atama Yap</button>
        </div>
    </form>
</div>
{% endblock %}
