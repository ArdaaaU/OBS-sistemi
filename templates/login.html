{% extends 'base.html' %}
{% block login_content %}
<div class="w-full max-w-sm bg-white rounded-2xl shadow-xl overflow-hidden px-8 py-10 border border-gray-100">
    <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-1">OBS GİRİŞ</h2>
    </div>
    
    <form method="POST" action="{{ url_for('login') }}" class="space-y-5">
        <div>
            <input type="text" name="username" placeholder="Kullanıcı Adı/No" required 
                class="w-full border border-gray-300 rounded-lg py-2.5 px-4 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
        </div>
        <div>
            <input type="password" name="password" placeholder="Şifre" required 
                class="w-full border border-gray-300 rounded-lg py-2.5 px-4 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
        </div>
        <div class="pt-2">
            <button type="submit" 
                class="w-full py-2.5 px-4 rounded-lg shadow-sm text-sm font-semibold text-white bg-[#1e293b] hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 transition duration-150 ease-in-out">
                Giriş Yap
            </button>
        </div>
    </form>

    <div class="mt-10 text-center">
        <p class="text-xs text-gray-500 mb-4 font-medium">Hızlı test için rollere tıklayın:</p>
        <div class="flex justify-center items-center gap-6">
            <div onclick="document.querySelector('input[name=username]').value='student1'; document.querySelector('input[name=password]').value='123456';" class="flex flex-col items-center gap-1 cursor-pointer text-gray-600 hover:text-indigo-600 transition">
                <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-lg shadow-sm hover:shadow-md transition">
                    <i class="fa-solid fa-user-graduate"></i>
                </div>
                <span class="text-[10px] font-semibold uppercase">Öğrenci</span>
            </div>
            <div onclick="document.querySelector('input[name=username]').value='academician1'; document.querySelector('input[name=password]').value='123456';" class="flex flex-col items-center gap-1 cursor-pointer text-gray-600 hover:text-indigo-600 transition">
                <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-lg shadow-sm hover:shadow-md transition">
                    <i class="fa-solid fa-chalkboard-user"></i>
                </div>
                <span class="text-[10px] font-semibold uppercase">Akademisyen</span>
            </div>
            <div onclick="document.querySelector('input[name=username]').value='admin'; document.querySelector('input[name=password]').value='123456';" class="flex flex-col items-center gap-1 cursor-pointer text-gray-600 hover:text-indigo-600 transition">
                <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-lg shadow-sm hover:shadow-md transition">
                    <i class="fa-solid fa-gears"></i>
                </div>
                <span class="text-[10px] font-semibold uppercase">Admin</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
